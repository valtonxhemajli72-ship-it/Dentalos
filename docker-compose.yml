# Local development only. Do not reuse these credentials for staging or production.
services:
  postgres:
    image: postgres:16-alpine
    container_name: dentalos-postgres
    environment:
      POSTGRES_DB: klinika360_dev
      POSTGRES_USER: dentalos
      POSTGRES_PASSWORD: dentalos_dev_password
    ports:
      - "5432:5432"
    volumes:
      - dentalos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dentalos -d klinika360_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  dentalos_postgres_data:
