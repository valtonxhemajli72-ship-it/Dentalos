name: Semgrep

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "42 4 * * 3"

permissions:
  contents: read

jobs:
  semgrep:
    name: Security rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/typescript
            p/secrets
